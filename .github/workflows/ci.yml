name: Build images
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TAG_NAME: 4.0.6-alpine

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v7

      - name: Set platform pair
        run: echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV
        env:
          platform: ${{ matrix.platform }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # metadata-action derives the OCI annotations from the GitHub repository
      # (title, description, source, licenses, ...), not from the image name, so
      # a single step covers both the builder and the final image. They are
      # exposed as annotations instead of config labels, so they are not
      # inherited by downstream images via `FROM`.
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/rails-base-final
          labels: |
            org.opencontainers.image.authors=georg@ledermann.dev

      - name: Build and push BUILDER image by digest
        id: build-builder
        uses: docker/build-push-action@v7
        with:
          context: builder
          platforms: ${{ matrix.platform }}
          provenance: false
          annotations: ${{ steps.meta.outputs.annotations }}
          # OCI media types are required for annotations to be stored; without
          # this the index/manifests use the Docker format, which drops them.
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/rails-base-builder,push-by-digest=true,name-canonical=true,push=true,oci-mediatypes=true
          cache-from: type=gha,scope=builder-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=builder-${{ env.PLATFORM_PAIR }}

      - name: Export BUILDER digest
        run: |
          mkdir -p /tmp/digests/builder
          digest="${{ steps.build-builder.outputs.digest }}"
          touch "/tmp/digests/builder/${digest#sha256:}"

      - name: Build and push FINAL image by digest
        id: build-final
        uses: docker/build-push-action@v7
        with:
          context: final
          platforms: ${{ matrix.platform }}
          provenance: false
          annotations: ${{ steps.meta.outputs.annotations }}
          # OCI media types are required for annotations to be stored; without
          # this the index/manifests use the Docker format, which drops them.
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/rails-base-final,push-by-digest=true,name-canonical=true,push=true,oci-mediatypes=true

      - name: Export FINAL digest
        run: |
          mkdir -p /tmp/digests/final
          digest="${{ steps.build-final.outputs.digest }}"
          touch "/tmp/digests/final/${digest#sha256:}"

      - name: Upload digests
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests
          if-no-files-found: error
          retention-days: 1

  push:
    runs-on: ubuntu-24.04
    needs: build
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Same annotations for both images (see build job). They are added at the
      # index level because imagetools does not carry over the annotations of
      # the per-platform manifests, and GHCR reads the package description from
      # the index of a multi-arch image.
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/rails-base-final
          labels: |
            org.opencontainers.image.authors=georg@ledermann.dev
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: index

      - name: Create and push BUILDER manifest
        working-directory: /tmp/digests/builder
        env:
          ANNOTATIONS: ${{ steps.meta.outputs.annotations }}
        run: |
          flags=()
          while IFS= read -r a; do [ -n "$a" ] && flags+=("--annotation" "$a"); done <<< "$ANNOTATIONS"
          docker buildx imagetools create "${flags[@]}" \
            -t ghcr.io/${{ github.repository_owner }}/rails-base-builder:${{ env.TAG_NAME }} \
            -t ghcr.io/${{ github.repository_owner }}/rails-base-builder:latest \
            $(printf 'ghcr.io/${{ github.repository_owner }}/rails-base-builder@sha256:%s ' *)

      - name: Create and push FINAL manifest
        working-directory: /tmp/digests/final
        env:
          ANNOTATIONS: ${{ steps.meta.outputs.annotations }}
        run: |
          flags=()
          while IFS= read -r a; do [ -n "$a" ] && flags+=("--annotation" "$a"); done <<< "$ANNOTATIONS"
          docker buildx imagetools create "${flags[@]}" \
            -t ghcr.io/${{ github.repository_owner }}/rails-base-final:${{ env.TAG_NAME }} \
            -t ghcr.io/${{ github.repository_owner }}/rails-base-final:latest \
            $(printf 'ghcr.io/${{ github.repository_owner }}/rails-base-final@sha256:%s ' *)

      - name: Inspect BUILDER image
        run: docker buildx imagetools inspect ghcr.io/${{ github.repository_owner }}/rails-base-builder:${{ env.TAG_NAME }}

      - name: Inspect FINAL image
        run: docker buildx imagetools inspect ghcr.io/${{ github.repository_owner }}/rails-base-final:${{ env.TAG_NAME }}
