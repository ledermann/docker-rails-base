name: Ruby version bump

on:
  schedule:
    - cron: '0 1 * * *'
      timezone: 'Europe/Berlin'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ruby-bump
  cancel-in-progress: false

env:
  TZ: Europe/Berlin

jobs:
  bump:
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - name: Resolve current and latest Ruby patch version
        id: versions
        run: |
          set -euo pipefail

          CURRENT=$(<.ruby-version)
          SERIES="${CURRENT%.*}"  # 4.0.5 -> 4.0

          LATEST=$(curl -sSfL --retry 5 --retry-all-errors --retry-delay 2 --connect-timeout 10 \
              https://raw.githubusercontent.com/docker-library/ruby/master/versions.json \
            | jq -r --arg s "$SERIES" '.[$s].version // empty')

          if [ -z "$LATEST" ]; then
            echo "::error::Could not resolve latest Ruby version for series $SERIES from docker-library/ruby versions.json"
            exit 1
          fi

          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST"   >> "$GITHUB_OUTPUT"

          if [ "$LATEST" = "$CURRENT" ]; then
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
            echo "Ruby $CURRENT is already the latest patch in the $SERIES series."
            exit 0
          fi

          # docker-library/ruby announces new versions in versions.json before
          # the corresponding Docker Hub image is published (can lag hours/days).
          # Skip the bump until ruby:${LATEST}-alpine is actually published,
          # otherwise CI on the generated PR would fail at image pull.
          TAG_URL="https://hub.docker.com/v2/repositories/library/ruby/tags/${LATEST}-alpine"
          if ! curl -fsSL --retry 5 --retry-all-errors --retry-delay 2 --connect-timeout 10 \
              -o /dev/null "$TAG_URL"; then
            echo "::notice::Ruby $LATEST announced upstream but ruby:${LATEST}-alpine not yet on Docker Hub. Will retry on next run."
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "needs_update=true" >> "$GITHUB_OUTPUT"
          echo "New Ruby patch available and image is published: $CURRENT -> $LATEST"

      - name: Patch repository files
        if: steps.versions.outputs.needs_update == 'true'
        env:
          CURRENT: ${{ steps.versions.outputs.current }}
          LATEST: ${{ steps.versions.outputs.latest }}
        run: |
          set -euo pipefail
          TODAY=$(date +%Y-%m-%d)

          echo "$LATEST" > .ruby-version
          echo "$LATEST" > builder/.ruby-version

          sed -i "s/^ruby '${CURRENT}'/ruby '${LATEST}'/" builder/Gemfile
          sed -i "s/^  ruby ${CURRENT}\$/  ruby ${LATEST}/" builder/Gemfile.lock
          sed -i "s|ruby:${CURRENT}-alpine|ruby:${LATEST}-alpine|" builder/Dockerfile
          sed -i "s|ruby:${CURRENT}-alpine|ruby:${LATEST}-alpine|" final/Dockerfile
          sed -i "s/TAG_NAME: ${CURRENT}-alpine/TAG_NAME: ${LATEST}-alpine/" .github/workflows/ci.yml

          # Keep prefixes specific so historical rows in the README version
          # table (e.g. "| 4.0.5 | 4.0.5-alpine | ... |") are not rewritten.
          sed -i \
            -e "s|ruby:${CURRENT}-alpine|ruby:${LATEST}-alpine|g" \
            -e "s|rails-base-builder:${CURRENT}-alpine|rails-base-builder:${LATEST}-alpine|g" \
            -e "s|rails-base-final:${CURRENT}-alpine|rails-base-final:${LATEST}-alpine|g" \
            README.md

          # Insert a new row right after the FIRST table's header separator.
          # The README has a second identical separator in the "Older Ruby
          # versions" details block, so the !inserted guard is load-bearing.
          NEW_ROW=$(printf '| %-12s | %-12s | %-15s |' "$LATEST" "${LATEST}-alpine" "$TODAY")
          awk -v row="$NEW_ROW" '
            !inserted && /^\| -+ \| -+ \| -+ \|$/ {
              print; print row; inserted = 1; next
            }
            { print }
          ' README.md > README.md.new && mv README.md.new README.md

          echo "--- Diff after patching ---"
          git --no-pager diff --stat

      - name: Create Pull Request
        if: steps.versions.outputs.needs_update == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.PAT }}
          branch: ruby-${{ steps.versions.outputs.latest }}
          delete-branch: true
          commit-message: "⬆️ Ruby ${{ steps.versions.outputs.latest }}"
          title: "⬆️ Ruby ${{ steps.versions.outputs.latest }}"
          body: |
            Bumps Ruby from `${{ steps.versions.outputs.current }}` to `${{ steps.versions.outputs.latest }}` (patch release).

            Source: [`docker-library/ruby` versions.json](https://github.com/docker-library/ruby/blob/master/versions.json)

            Generated by [`ruby-bump.yml`](./.github/workflows/ruby-bump.yml).
          labels: |
            dependencies
            ruby
